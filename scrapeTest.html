<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Scraper</title>
</head>
<body>
    <h2>Scraped Train Status:</h2>
    <div id="target-container">Fetching data...</div>

    <script>
        // The URL you want to scrape
        const targetUrl = 'https://railradar.in/train-status/13106';
        
        // [Pass your target URL through the proxy to bypass browser security]
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        fetch(proxyUrl)
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Network response was not ok.');
            })
            .then(data => {
                // The proxy returns the HTML as a string inside data.contents
                const htmlString = data.contents;

                // [Convert the raw HTML string into a queryable document object]
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlString, 'text/html');

                // [Target the specific div or table you want from the source website]
                // Example: Let's assume you want a specific element, otherwise grab the body
                const scrapedElement = doc.querySelector('body'); 

                const container = document.getElementById('target-container');
                container.innerHTML = ''; // Clear loading text

                if (scrapedElement) {
                    // Inject the scraped HTML directly into your page
                    container.innerHTML = scrapedElement.innerHTML;
                } else {
                    container.innerHTML = 'Could not find the target elements on the page.';
                }
            })
            .catch(error => {
                console.error('Fetch error:', error);
                document.getElementById('target-container').innerHTML = 'Failed to fetch data.';
            });
    </script>
</body>
</html>
