<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Iframe Scraper</title>
    <style>
        /* [Hide the iframe so the user only sees the final scraped content] */
        #scraper-frame {
            display: none; 
        }
    </style>
</head>
<body>
    <h2>Scraped Content Will Appear Below:</h2>
    <div id="output">Loading data from iframe...</div>

    <iframe id="scraper-frame" src="https://railradar.in/train-status/13106"></iframe>

    <script>
        const iframe = document.getElementById('scraper-frame');
        const output = document.getElementById('output');

        // [Wait until the iframe has completely finished loading its content]
        iframe.onload = function() {
            try {
                // Attempt to access the document inside the iframe
                // THIS IS WHERE THE BROWSER WILL BLOCK CROSS-ORIGIN REQUESTS
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

                // [Select the specific elements you want to scrape] 
                // Using 'body' here as a broad example
                const scrapedContent = iframeDoc.querySelector('body').innerHTML;

                // Clear the loading message and insert the scraped HTML
                output.innerHTML = ''; 
                output.innerHTML = scrapedContent;

            } catch (error) {
                // [Open your browser console by pressing F12 to see this exact error]
                output.innerHTML = '<b>Scraping Failed:</b> The browser blocked access due to CORS restrictions.';
                console.error("CORS Error details:", error);
            }
        };
    </script>
</body>
</html>
