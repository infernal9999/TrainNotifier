<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailRadar API Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 sm:p-8">

    <div class="max-w-2xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-teal-400">API Connectivity Test</h1>
            <p class="text-slate-400 mt-2 text-sm">Testing: <code>api.railradar.in</code> with Authorization Headers</p>
        </header>

        <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl border border-slate-700">
            <div class="flex flex-col sm:flex-row gap-4 mb-6">
                <div class="flex-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Train Number</label>
                    <input type="text" id="trainNo" value="12101" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-teal-500">
                </div>
                <div class="flex items-end">
                    <button onclick="testFetch()" id="btn"
                        class="w-full sm:w-auto bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold py-2 px-8 rounded-lg transition-all active:scale-95">
                        Fetch Train Data
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Live Response Output</label>
                <div id="status" class="hidden mb-2 text-xs font-mono"></div>
                <pre id="output" class="bg-slate-900 border border-slate-700 rounded-lg p-4 h-96 overflow-auto text-sm text-emerald-400 font-mono">
// Click the button to start fetching...
                </pre>
            </div>
        </div>

        <footer class="mt-6 text-center">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">Console logs are also active (F12)</p>
        </footer>
    </div>

    <script>
        async function testFetch() {
            const trainNo = document.getElementById('trainNo').value;
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            const apiKey = "rr_w6s8thfdjvswfswpsb8s1xk7bc72zfhv";

            // UI Feedback
            btn.disabled = true;
            btn.innerText = "Fetching...";
            output.innerText = "// Connecting to server...";
            status.classList.remove('hidden');
            status.innerHTML = `<span class="text-yellow-500 italic">Sending GET request with Bearer token...</span>`;

            try {
                const response = await fetch(`https://api.railradar.in/v1/live/train/${trainNo}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    status.innerHTML = `<span class="text-green-500 font-bold">● 200 OK - Data Received Successfully</span>`;
                    output.innerText = JSON.stringify(data, null, 4);
                    console.log("Success:", data);
                } else {
                    status.innerHTML = `<span class="text-red-500 font-bold">● Error ${response.status}</span>`;
                    output.innerText = JSON.stringify(data, null, 4);
                }

            } catch (error) {
                status.innerHTML = `<span class="text-red-500 font-bold">● Network Connection Failed</span>`;
                output.innerText = "Error: " + error.message + "\n\nPossible causes:\n1. Internet is disconnected.\n2. CORS restriction (if testing from a restricted domain).\n3. API endpoint is down.";
                console.error("Fetch Error:", error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Fetch Train Data";
            }
        }
    </script>
</body>
</html>
